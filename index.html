<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>학원 성적표 통합 시스템</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <style>
    @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css");
    
    body { font-family: 'Pretendard', 'Malgun Gothic', sans-serif; margin: 0; padding: 0; background-color: #f4f6f9; color: #333; }
    
    .spinner-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 10005; justify-content: center; align-items: center; flex-direction: column; }
    .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid #1a3978; border-radius: 50%; animation: spin 1s linear infinite; }
    .spinner-text { margin-top: 15px; font-weight: bold; color: #1a3978; font-size: 15px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 10000; justify-content: center; align-items: center; }
    .modal-box { background: white; width: 340px; border-radius: 12px; padding: 25px 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    .modal-message { font-size: 15px; font-weight: 600; color: #333; line-height: 1.5; margin-bottom: 20px; white-space: pre-wrap; word-break: keep-all; }
    .modal-btn { padding: 10px 20px; border: none; border-radius: 50px; font-weight: bold; font-size: 14px; cursor: pointer; width: 100%; background-color: #1a3978; color: white; transition: 0.2s; }
    .modal-btn:hover { background-color: #112652; }

    .academy-header-bar { background-color: #1a3978; color: #ffffff; padding: 12px 25px; font-size: 18px; font-weight: 900; display: flex; justify-content: center; align-items: center; position: relative; letter-spacing: 1px; box-shadow: 0 2px 5px rgba(0,0,0,0.15); }
    .academy-header-bar .version { position: absolute; right: 25px; font-size: 11px; color: #adb5bd; font-weight: normal; }

    .app-body { padding: 20px; max-width: 1600px; margin: 0 auto; }

    .tab-container { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ced4da; padding-bottom: 0; }
    .tab-btn { background-color: #e9ecef; color: #495057; border: 1px solid #ced4da; border-bottom: none; padding: 10px 30px; font-size: 15px; font-weight: bold; border-radius: 8px 8px 0 0; cursor: pointer; transition: 0.2s; }
    .tab-btn:hover { background-color: #dee2e6; }
    .tab-btn.active { background-color: #fff; color: #1a3978; border-color: #1a3978; border-bottom: 2px solid #fff; margin-bottom: -2px; z-index: 2; box-shadow: 0 -2px 5px rgba(0,0,0,0.05); }

    .tab-content { display: none; background-color: #fff; border-radius: 0 8px 8px 8px; padding: 25px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); min-height: 600px; }
    .tab-content.active { display: block; }

    .header-bar { background-color: #f8f9fa; padding: 15px 20px; border-radius: 8px; border: 1px solid #dee2e6; display: flex; gap: 10px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
    .select-group { display: flex; align-items: center; gap: 6px; }
    .select-group label { font-weight: bold; font-size: 14px; color: #1a3978; margin-right: 4px;}
    select, input[type="text"], input[type="number"] { padding: 8px; border: 1px solid #ced4da; border-radius: 4px; font-family: 'Pretendard', sans-serif; font-size: 14px; outline: none; box-sizing: border-box; }
    select:focus, input:focus { border-color: #1a3978; }
    
    .btn-primary { padding: 0 20px; border: none; border-radius: 50px; font-weight: bold; font-size: 14px; background-color: #1366ce; color: white; transition: 0.2s; height: 38px; cursor: pointer; }
    .btn-primary:hover { background-color: #0f52a8; }
    
    .table-wrapper { width: 100%; overflow-x: auto; border: 1px solid #dee2e6; border-radius: 4px; }
    table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13.5px; text-align: center; white-space: nowrap; }
    th, td { border-bottom: 1px solid #dee2e6; border-right: 1px solid #dee2e6; padding: 8px 4px; }
    th { background-color: #f1f3f5; font-weight: bold; color: #333; position: sticky; top: 0; z-index: 10; border-top: none; }
    td:last-child, th:last-child { border-right: none; }
    
    .sticky-col { position: sticky; background-color: #fff; z-index: 5; border-right: 2px solid #dee2e6; }
    th.sticky-col { background-color: #f1f3f5; z-index: 11; }
    
    .setup-input { width: 90%; padding: 6px; border: 1px solid #ccc; border-radius: 3px; font-family: 'Pretendard'; font-size: 13.5px; box-sizing: border-box; }
    .setup-input:focus { border-color: #1366ce; outline: none; }

    .ox-input { width: 35px; text-align: center; font-weight: 900; font-size: 15px; border: 1px solid #ccc; border-radius: 3px; padding: 4px; text-transform: uppercase; background-color: transparent; }
    .ox-input:focus { background-color: #e6f0ff; border-color: #1366ce; outline: none; box-shadow: 0 0 0 2px rgba(19,102,206,0.3); }
    .ox-input.val-o { color: #28a745; } 
    .ox-input.val-x { color: #dc3545; } 

    .paste-zone { border: 2px dashed #1a3978; background-color: #f4f6f9; padding: 20px; text-align: center; border-radius: 8px; margin-bottom: 20px; cursor: pointer; transition: 0.2s; }
    .paste-zone:hover { background-color: #e6f0ff; }
  </style>
</head>
<body>

  <!-- Vercel 배포 URL 입력란 -->
  <input type="hidden" id="backendUrl" value="https://script.google.com/macros/s/AKfycbwvGxr_gp1L2e7L5D_1u8LZ0BP2K07LMtjuRsvqKEVyCnBikAEYpqztc0REuXmoNMHvtg/exec">

  <div class="spinner-overlay" id="globalSpinner">
    <div class="spinner"></div>
    <div class="spinner-text" id="spinnerText">처리 중입니다...</div>
  </div>

  <div class="modal-overlay" id="customAlertModal">
    <div class="modal-box">
      <div id="modalMessage" class="modal-message" style="word-break: break-all; text-align: left;"></div>
      <button class="modal-btn" onclick="document.getElementById('customAlertModal').style.display='none'">확인</button>
    </div>
  </div>

  <div class="academy-header-bar">
    <span>SG청운학원 - 성적표 통합 시스템</span>
    <span class="version">v.26.07.24-04</span>
  </div>

  <div class="app-body">
    <div class="tab-container">
      <button class="tab-btn active" onclick="switchTab('tab-setup')">1. 시험 기본 세팅 (관리자)</button>
      <button class="tab-btn" onclick="switchTab('tab-input')">2. 채점 입력 (선생님)</button>
      <button class="tab-btn" onclick="switchTab('tab-report')">3. 성적표 출력</button>
    </div>

    <!-- ========================================== -->
    <!-- 1. 시험 기본 세팅 (관리자) -->
    <!-- ========================================== -->
    <div id="tab-setup" class="tab-content active">
      <div class="header-bar">
        <div class="select-group">
          <label>연도/학기</label>
          <select id="setupYear" onchange="checkExistingSetup()"><option value="2026년">2026년</option><option value="2027년">2027년</option></select>
          <select id="setupTerm" onchange="checkExistingSetup()"><option value="봄학기">봄학기</option><option value="여름학기">여름학기</option><option value="가을학기">가을학기</option><option value="겨울학기">겨울학기</option></select>
        </div>
        <div class="select-group" style="margin-left: 10px;">
          <label>과정</label>
          <input type="text" id="setupLevel" placeholder="난이도 (ex.마루)" style="width: 100px;" onchange="checkExistingSetup()">
          <input type="text" id="setupCourse" placeholder="과정명 (ex.초5-1)" style="width: 120px;" onchange="checkExistingSetup()">
        </div>
        
        <div class="select-group" style="margin-left: auto; border-left: 2px solid #dee2e6; padding-left: 15px;">
          <label>총 문항 수</label>
          <input type="number" id="setupTotalCount" value="45" min="1" max="100" style="width: 60px;" onchange="renderSetupTable()">
        </div>
        <div class="select-group">
          <label>시작 번호</label>
          <input type="number" id="setupStartNum" value="1" min="1" max="100" style="width: 60px;" onchange="renderSetupTable()">
        </div>
        <button class="btn-primary" style="margin-left: 10px;" onclick="saveExamSetup()">세팅 정보 저장</button>
      </div>

      <div class="paste-zone" id="hwpPasteZone">
        <h4 style="margin-top: 0; color: #1a3978; margin-bottom: 8px;">📄 엑셀/한글 출제표 복사-붙여넣기 영역</h4>
        <p style="color: #666; margin-bottom: 0; font-size: 14px;">답지 표(단원명, 배점)를 복사한 후 이곳을 클릭하고 <b>Ctrl + V</b>를 누르세요. 자동으로 매핑됩니다.</p>
        <input type="text" id="pasteCatcher" style="opacity: 0; position: absolute; pointer-events: none;">
      </div>

      <div class="table-wrapper" style="max-height: 500px;">
        <table>
          <thead>
            <tr>
              <th width="8%">문항번호</th>
              <th width="42%">출제 단원명</th>
              <th width="20%">배점 (난이도 자동)</th>
              <th width="20%">난이도 (확인용)</th>
              <th width="10%">상태</th>
            </tr>
          </thead>
          <tbody id="setupTableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- ========================================== -->
    <!-- 2. 채점 입력 (선생님) -->
    <!-- ========================================== -->
    <div id="tab-input" class="tab-content">
      <div class="header-bar">
        <div class="select-group">
          <label>학기 선택</label>
          <select id="tchTerm" style="width:140px;" onchange="filterCourses()"><option value="">선택하세요</option></select>
        </div>
        <div class="select-group">
          <label>과정 선택</label>
          <select id="tchCourse" style="width:140px;" onchange="filterTeachers()"><option value="">선택하세요</option></select>
        </div>
        <div class="select-group">
          <label>선생님 선택</label>
          <select id="tchTeacher" style="width:100px;" onchange="filterClasses()"><option value="">선택</option></select>
        </div>
        <div class="select-group">
          <label>반 선택</label>
          <select id="tchClass" style="width:140px;"><option value="">선택</option></select>
        </div>
        <button class="btn-primary" style="margin-left: auto;" onclick="loadGradesData()">명단 불러오기</button>
        <button class="btn-primary" style="background-color: #d32f2f;" onclick="saveGrades()">결과 저장</button>
      </div>

      <div class="table-wrapper" style="height: 600px; display: none;" id="inputTableContainer">
        <table>
          <thead id="inputTableHeader"></thead>
          <tbody id="inputTableBody"></tbody>
        </table>
      </div>
      <div id="inputEmptyState" style="text-align: center; padding: 100px 0; color: #888; font-weight: bold; border: 2px dashed #dee2e6; border-radius: 8px;">
        상단의 학기, 과정, 선생님, 반을 선택하고 [명단 불러오기]를 눌러주세요.
      </div>
    </div>

    <!-- 3. 성적표 출력 -->
    <div id="tab-report" class="tab-content">
      <h3 style="color:#aaa; text-align:center; padding-top:100px;">성적표 출력 화면 구성 중...</h3>
    </div>

  </div>

  <script>
    let globalMetadata = { setups: [], rosters: [] };
    let currentExamSetup = null;

    function showAlert(msg) { document.getElementById('modalMessage').innerHTML = msg; document.getElementById('customAlertModal').style.display = 'flex'; }
    function showLoading(status, msg = "처리 중입니다...") { document.getElementById('spinnerText').innerText = msg; document.getElementById('globalSpinner').style.display = status ? 'flex' : 'none'; }
    
    function handleError(err) {
      showLoading(false);
      if(err.message === "Failed to fetch" || err.name === "TypeError") {
        showAlert("🚫 <b>네트워크 통신 에러 (Failed to fetch)</b><br><br>1. GAS 배포 시 <b>액세스 권한을 '모든 사용자(Anyone)'</b>로 설정했는지 확인해주세요.<br><br>2. <b>backendUrl</b> 주소에 오타나 공백이 없는지 확인해주세요.");
      } else {
        showAlert("에러: " + err.message);
      }
    }

    function switchTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      event.target.classList.add('active');
      
      // 🟢 선생님 탭 진입 시 무조건 최신 데이터를 다시 불러오도록 수정
      if(tabId === 'tab-input') {
        fetchMetadata(); 
      }
    }

    window.onload = function() { renderSetupTable(); };

    // ==========================================
    // 1. 시험 기본 세팅 (관리자)
    // ==========================================
    function renderSetupTable() {
      const totalCount = parseInt(document.getElementById('setupTotalCount').value) || 45;
      const startNum = parseInt(document.getElementById('setupStartNum').value) || 1;
      const tbody = document.getElementById('setupTableBody');
      tbody.innerHTML = '';
      for (let i = 0; i < totalCount; i++) {
        let qNum = startNum + i;
        tbody.innerHTML += `
          <tr>
            <td>${qNum}</td>
            <td><input type="text" class="setup-input unit-input" id="unit_${qNum}"></td>
            <td><input type="number" class="setup-input score-input" id="score_${qNum}" oninput="updateDiff(${qNum})" placeholder="2,3,4,5"></td>
            <td><input type="text" class="setup-input diff-input" id="diff_${qNum}" readonly style="background-color:#f1f3f5; text-align:center;"></td>
            <td id="status_${qNum}" style="color:#adb5bd;">-</td>
          </tr>`;
      }
    }

    function updateDiff(qNum) {
      const score = document.getElementById(`score_${qNum}`).value;
      const diffInput = document.getElementById(`diff_${qNum}`);
      const statusCell = document.getElementById(`status_${qNum}`);
      let diff = "";
      if (score == "2") diff = "하";
      else if (score == "3") diff = "중";
      else if (score == "4") diff = "상";
      else if (score == "5") diff = "최상";
      diffInput.value = diff;

      if (document.getElementById(`unit_${qNum}`).value.trim() && diff) {
        statusCell.innerHTML = "✔"; statusCell.style.color = "#28a745"; statusCell.style.fontWeight = "bold";
      } else {
        statusCell.innerHTML = "-"; statusCell.style.color = "#adb5bd";
      }
    }

    function checkExistingSetup() {
      const y = document.getElementById('setupYear').value;
      const t = document.getElementById('setupTerm').value;
      const l = document.getElementById('setupLevel').value.trim();
      const c = document.getElementById('setupCourse').value.trim();
      if (!l || !c) return;

      const payload = { action: 'getExamSetup', year: y, term: t, level: l, course: c };
      const url = document.getElementById('backendUrl').value.trim();
      if (url.includes('YOUR_GAS_ID_HERE')) return;

      fetch(url, { method: 'POST', body: JSON.stringify(payload) })
      .then(res => res.json())
      .then(res => {
        if(res.success && res.data) {
           document.getElementById('setupTotalCount').value = res.data.totalCount;
           document.getElementById('setupStartNum').value = res.data.startNum;
           renderSetupTable();
           res.data.items.forEach(item => {
             let u = document.getElementById(`unit_${item.num}`);
             let s = document.getElementById(`score_${item.num}`);
             if(u) u.value = item.unit;
             if(s) { s.value = item.score; updateDiff(item.num); }
           });
           showAlert("기존 세팅 데이터가 자동으로 불러와졌습니다.");
        } else {
           renderSetupTable();
        }
      })
      .catch(handleError);
    }

    document.getElementById('hwpPasteZone').addEventListener('click', function() { document.getElementById('pasteCatcher').focus(); this.style.backgroundColor = '#e6f0ff'; setTimeout(() => this.style.backgroundColor = '#f4f6f9', 500); });
    document.getElementById('pasteCatcher').addEventListener('paste', function(e) {
      e.preventDefault();
      let htmlData = (e.clipboardData || window.clipboardData).getData('text/html');
      let textData = (e.clipboardData || window.clipboardData).getData('text/plain');
      let rows = [];
      if(htmlData) {
        let t = document.createElement('div'); t.innerHTML = htmlData;
        let tbl = t.querySelector('table');
        if(tbl) tbl.querySelectorAll('tr').forEach(tr => {
          let r = Array.from(tr.querySelectorAll('td,th')).map(c => c.innerText.replace(/<[^>]+>/g, '').trim());
          if(r.join('')) rows.push(r);
        });
      } else if(textData) {
        textData.split(/\r?\n/).forEach(l => { let r = l.split('\t').map(c => c.trim()); if(r.join('')) rows.push(r); });
      }
      if(rows.length===0) return showAlert("표 데이터가 아닙니다.");
      
      let st = (rows[0].join('').includes('단원') || rows[0].join('').includes('난이도') || rows[0].join('').includes('배점')) ? 1 : 0;
      let count = parseInt(document.getElementById('setupTotalCount').value);
      let sNum = parseInt(document.getElementById('setupStartNum').value);
      
      let c = 0;
      for(let i = st; i < rows.length && c < count; i++) {
        let u = rows[i].length >= 3 ? rows[i][1] : rows[i][0];
        let d = rows[i].length >= 3 ? rows[i][2] : rows[i][1];
        if(u) document.getElementById(`unit_${sNum+c}`).value = u;
        if(d) {
          let score = d.replace(/[^0-9]/g, '');
          if(score) { document.getElementById(`score_${sNum+c}`).value = score; updateDiff(sNum+c); }
        }
        c++;
      }
    });

    function saveExamSetup() {
      const year = document.getElementById('setupYear').value;
      const term = document.getElementById('setupTerm').value;
      const level = document.getElementById('setupLevel').value.trim();
      const course = document.getElementById('setupCourse').value.trim();
      if(!level || !course) return showAlert("과정 난이도와 과정명을 모두 입력하세요.");

      const totalCount = parseInt(document.getElementById('setupTotalCount').value);
      const startNum = parseInt(document.getElementById('setupStartNum').value);
      const items = [];
      for (let i = 0; i < totalCount; i++) {
        let qNum = startNum + i;
        items.push({ 
          num: qNum, 
          unit: document.getElementById(`unit_${qNum}`).value.trim(), 
          score: parseInt(document.getElementById(`score_${qNum}`).value)||0,
          diff: document.getElementById(`diff_${qNum}`).value
        });
      }

      const payload = { action: 'saveExamSetup', year, term, level, course, totalCount, startNum, items };
      showLoading(true, "세팅 정보를 저장 중입니다...");
      
      const url = document.getElementById('backendUrl').value.trim();
      
      fetch(url, { method: 'POST', body: JSON.stringify(payload) })
      .then(res => res.json()).then(res => { showLoading(false); if(res.success) { showAlert("✔ <b>저장 완료</b>"); globalMetadata.setups=[]; } else { showAlert("에러: " + res.error); } })
      .catch(handleError);
    }


    // ==========================================
    // 2. 채점 입력 (선생님)
    // ==========================================
    function fetchMetadata() {
      const url = document.getElementById('backendUrl').value.trim();
      if (url.includes('YOUR_GAS_ID_HERE')) return;
      showLoading(true, "시스템 데이터를 불러오는 중...");
      
      fetch(url, { method: 'POST', body: JSON.stringify({ action: 'getDropdownData' }) })
      .then(res => res.json())
      .then(res => {
        showLoading(false);
        if(res.success) {
          globalMetadata = res.data;
          populateTerms();
        } else { showAlert("에러: " + res.error); }
      })
      .catch(handleError);
    }

    function sortTerms(terms) {
      const seasonWeight = { '봄학기': 1, '여름학기': 2, '가을학기': 3, '겨울학기': 4 };
      return terms.sort((a, b) => {
        let aYear = parseInt(a.split(' ')[0]), bYear = parseInt(b.split(' ')[0]);
        if(aYear !== bYear) return aYear - bYear;
        let aS = seasonWeight[a.split(' ')[1]] || 5, bS = seasonWeight[b.split(' ')[1]] || 5;
        return aS - bS;
      });
    }

    function populateTerms() {
      let terms = [...new Set(globalMetadata.setups.map(s => s.fullTerm))];
      terms = sortTerms(terms);
      const termSel = document.getElementById('tchTerm');
      termSel.innerHTML = '<option value="">학기 선택</option>';
      terms.forEach(t => termSel.innerHTML += `<option value="${t}">${t}</option>`);
      filterCourses();
    }

    function filterCourses() {
      const term = document.getElementById('tchTerm').value;
      const crsSel = document.getElementById('tchCourse');
      crsSel.innerHTML = '<option value="">과정 선택</option>';
      if(term) {
        let courses = [...new Set(globalMetadata.setups.filter(s => s.fullTerm === term).map(s => s.fullCourse))];
        courses.sort().forEach(c => crsSel.innerHTML += `<option value="${c}">${c}</option>`);
      }
      filterTeachers();
    }

    function filterTeachers() {
      const term = document.getElementById('tchTerm').value;
      const course = document.getElementById('tchCourse').value;
      const tSel = document.getElementById('tchTeacher');
      tSel.innerHTML = '<option value="">선택</option>';
      if(term && course) {
        let teachers = [...new Set(globalMetadata.rosters.filter(r => r.fullTerm === term && r.fullCourse === course).map(r => r.teacher))];
        teachers.sort().forEach(t => tSel.innerHTML += `<option value="${t}">${t}</option>`);
      }
      filterClasses();
    }

    function filterClasses() {
      const term = document.getElementById('tchTerm').value;
      const course = document.getElementById('tchCourse').value;
      const teacher = document.getElementById('tchTeacher').value;
      const cSel = document.getElementById('tchClass');
      cSel.innerHTML = '<option value="">선택</option>';
      if(term && course && teacher) {
        let classes = [...new Set(globalMetadata.rosters.filter(r => r.fullTerm === term && r.fullCourse === course && r.teacher === teacher).map(r => r.className))];
        classes.sort().forEach(c => cSel.innerHTML += `<option value="${c}">${c}</option>`);
      }
    }

    function loadGradesData() {
      const term = document.getElementById('tchTerm').value;
      const course = document.getElementById('tchCourse').value;
      const teacher = document.getElementById('tchTeacher').value;
      const className = document.getElementById('tchClass').value;
      if (!term || !course || !teacher || !className) return showAlert("모든 조건을 선택해주세요.");

      showLoading(true, "명단과 성적 데이터를 불러옵니다...");
      const url = document.getElementById('backendUrl').value.trim();
      
      fetch(url, { method: 'POST', body: JSON.stringify({ action: 'loadInputWorkflow', term, course, teacher, className }) })
      .then(res => res.json())
      .then(res => {
        showLoading(false);
        if(res.success) renderInputTable(res.data.setupData, res.data.students, res.data.grades);
        else showAlert("· Error: " + res.error);
      })
      .catch(handleError);
    }

    function renderInputTable(setupData, students, grades) {
      document.getElementById('inputEmptyState').style.display = 'none';
      document.getElementById('inputTableContainer').style.display = 'block';
      currentExamSetup = setupData; 

      const thead = document.getElementById('inputTableHeader');
      const tbody = document.getElementById('inputTableBody');

      let tr1 = `<tr><th width="4%" rowspan="2">No.</th><th width="8%" rowspan="2" class="sticky-col">학생명</th><th width="6%" rowspan="2" class="sticky-col" style="left: 8%;">현재총점</th><th colspan="${setupData.totalCount}">문항별 O/X 입력 (1/2 자동 변환)</th></tr><tr>`;
      for (let i = 0; i < setupData.totalCount; i++) tr1 += `<th>${setupData.startNum + i}</th>`;
      tr1 += `</tr>`;
      thead.innerHTML = tr1;

      tbody.innerHTML = '';
      if(students.length === 0) return tbody.innerHTML = `<tr><td colspan="${3 + setupData.totalCount}" style="padding: 20px; color: red;">명단이 없습니다.</td></tr>`;

      students.forEach((st, rIdx) => {
        let stGrade = grades.find(g => g.name === st.name) || { totalScore: 0, answers: {} };
        
        let rowHtml = `<tr>
          <td style="background-color: #f8f9fa;">${String(rIdx + 1).padStart(2, '0')}</td>
          <td class="sticky-col" style="font-weight: bold;">${st.name}</td>
          <td class="sticky-col" style="left: 8%; font-weight: 900; color: #1a3978;" id="totalScore_${rIdx}">${stGrade.totalScore}</td>`;
        
        for (let cIdx = 0; cIdx < setupData.totalCount; cIdx++) {
          let qNum = setupData.startNum + cIdx;
          let val = stGrade.answers[qNum] || "";
          let colorClass = val === 'O' ? 'val-o' : (val === 'X' ? 'val-x' : '');
          rowHtml += `<td><input type="text" class="ox-input grid-nav ${colorClass}" data-row="${rIdx}" data-col="${cIdx}" maxlength="1" value="${val}" oninput="handleOxInput(event, ${rIdx})"></td>`;
        }
        rowHtml += `</tr>`;
        tbody.insertAdjacentHTML('beforeend', rowHtml);
      });

      attachKeyboardNavigationListeners(setupData.totalCount, students.length);
    }

    function handleOxInput(e, rIdx) {
      let inputEl = e.target; let val = inputEl.value.toLowerCase();
      inputEl.classList.remove('val-o', 'val-x');
      let isValidInput = false;

      if (['1','o','ㅇ'].includes(val)) { inputEl.value = 'O'; inputEl.classList.add('val-o'); isValidInput = true; }
      else if (['2','x','ㅂ'].includes(val)) { inputEl.value = 'X'; inputEl.classList.add('val-x'); isValidInput = true; }
      else { inputEl.value = ''; }

      calculateRowScore(rIdx);
      if (isValidInput) moveToNextInput(inputEl);
    }

    function calculateRowScore(rIdx) {
      let totalScore = 0;
      document.querySelectorAll(`.grid-nav[data-row="${rIdx}"]`).forEach((input, cIdx) => {
        if (input.value === 'O') totalScore += (currentExamSetup.items[cIdx].score || 0);
      });
      document.getElementById(`totalScore_${rIdx}`).innerText = totalScore;
    }

    function moveToNextInput(currentInput) {
      let r = parseInt(currentInput.dataset.row), c = parseInt(currentInput.dataset.col);
      let next = document.querySelector(`.grid-nav[data-row="${r}"][data-col="${c + 1}"]`) || document.querySelector(`.grid-nav[data-row="${r + 1}"][data-col="0"]`);
      if(next) { next.focus(); if(next.value) next.select(); }
    }

    function attachKeyboardNavigationListeners(totalCols, totalRows) {
      document.querySelectorAll('.grid-nav').forEach(input => {
        input.onkeydown = function(e) {
          let r = parseInt(this.dataset.row), c = parseInt(this.dataset.col), next;
          if (e.key === "ArrowRight") next = document.querySelector(`.grid-nav[data-row="${r}"][data-col="${c + 1}"]`);
          else if (e.key === "ArrowLeft") next = document.querySelector(`.grid-nav[data-row="${r}"][data-col="${c - 1}"]`);
          else if (e.key === "ArrowDown") next = document.querySelector(`.grid-nav[data-row="${r + 1}"][data-col="${c}"]`);
          else if (e.key === "ArrowUp") next = document.querySelector(`.grid-nav[data-row="${r - 1}"][data-col="${c}"]`);
          else if (e.key === "Enter") { e.preventDefault(); next = document.querySelector(`.grid-nav[data-row="${r}"][data-col="${c + 1}"]`) || document.querySelector(`.grid-nav[data-row="${r + 1}"][data-col="0"]`); }
          if (next) { e.preventDefault(); next.focus(); if(next.value) next.select(); }
        };
      });
    }

    function saveGrades() {
      if (!currentExamSetup) return showAlert("명단을 먼저 불러와 주세요.");
      const term = document.getElementById('tchTerm').value;
      const course = document.getElementById('tchCourse').value;
      const teacher = document.getElementById('tchTeacher').value;
      const className = document.getElementById('tchClass').value;
      
      let studentsData = [];
      document.getElementById('inputTableBody').querySelectorAll('tr').forEach((tr, rIdx) => {
        let name = tr.cells[1].innerText.trim();
        let total = document.getElementById(`totalScore_${rIdx}`).innerText;
        let answers = {};
        tr.querySelectorAll('.grid-nav').forEach((input, cIdx) => answers[currentExamSetup.startNum + cIdx] = input.value);
        studentsData.push({ name: name, totalScore: total, answers: answers });
      });

      showLoading(true, "성적DB에 저장 중입니다...");
      const url = document.getElementById('backendUrl').value.trim();
      
      fetch(url, { method: 'POST', body: JSON.stringify({ action: 'saveStudentGrades', term, course, teacher, className, students: studentsData }) })
      .then(res => res.json()).then(res => { showLoading(false); if(res.success) showAlert("✔ <b>저장 완료</b>"); else showAlert("에러: " + res.error); })
      .catch(handleError);
    }
  </script>
</body>
