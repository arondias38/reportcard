<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>학원 성적표 통합 시스템</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css");
    
    body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; background-color: #f4f6f9; color: #333; }
    
    .spinner-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 10005; justify-content: center; align-items: center; flex-direction: column; }
    .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid #1a3978; border-radius: 50%; animation: spin 1s linear infinite; }
    .spinner-text { margin-top: 15px; font-weight: bold; color: #1a3978; font-size: 15px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 10000; justify-content: center; align-items: center; }
    .modal-box { background: white; width: 400px; border-radius: 12px; padding: 25px 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    .modal-btn { padding: 10px 20px; border: none; border-radius: 50px; font-weight: bold; font-size: 14px; cursor: pointer; width: 100%; background-color: #1a3978; color: white; margin-top: 15px; }

    .academy-header-bar { background-color: #1a3978; color: #ffffff; padding: 12px 25px; font-size: 18px; font-weight: 900; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.15); }
    .app-body { padding: 20px; max-width: 1600px; margin: 0 auto; }

    .tab-container { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ced4da; }
    .tab-btn { background-color: #e9ecef; color: #495057; border: 1px solid #ced4da; border-bottom: none; padding: 10px 30px; font-size: 15px; font-weight: bold; border-radius: 8px 8px 0 0; cursor: pointer; }
    .tab-btn.active { background-color: #fff; color: #1a3978; border-color: #1a3978; border-bottom: 2px solid #fff; margin-bottom: -2px; z-index: 2; }

    .tab-content { display: none; background-color: #fff; border-radius: 0 8px 8px 8px; padding: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); min-height: 600px; }
    .tab-content.active { display: block; }

    .header-bar { background-color: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #dee2e6; display: flex; gap: 15px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
    .select-group { display: flex; align-items: center; gap: 8px; }
    .select-group label { font-weight: bold; font-size: 13px; color: #1a3978; }
    select, input[type="text"], input[type="number"] { padding: 8px; border: 1px solid #ced4da; border-radius: 4px; font-family: 'Pretendard'; font-size: 13px; }
    
    .btn-primary { padding: 0 20px; border: none; border-radius: 50px; font-weight: bold; font-size: 13px; background-color: #1366ce; color: white; height: 38px; cursor: pointer; }
    .btn-action { padding: 6px 12px; border: none; border-radius: 4px; font-weight: bold; font-size: 12px; cursor: pointer; color: white; }
    
    .table-wrapper { width: 100%; overflow-x: auto; border: 1px solid #dee2e6; max-height: 600px; }
    table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; text-align: center; white-space: nowrap; }
    th, td { border-bottom: 1px solid #dee2e6; border-right: 1px solid #dee2e6; padding: 6px 4px; }
    th { background-color: #f1f3f5; font-weight: bold; position: sticky; top: 0; z-index: 10; }
    .sticky-col { position: sticky; background-color: #fff; z-index: 5; border-right: 2px solid #dee2e6; }
    th.sticky-col { background-color: #f1f3f5; z-index: 11; }
    .ox-input { width: 30px; text-align: center; font-weight: 900; font-size: 14px; border: 1px solid #ccc; border-radius: 3px; padding: 4px; }
    .ox-input.val-o { color: #28a745; } .ox-input.val-x { color: #dc3545; }

    .paste-zone { border: 2px dashed #1a3978; background-color: #f4f6f9; padding: 20px; text-align: center; border-radius: 8px; margin-bottom: 20px; cursor: pointer; }

    /* 성적표 A4 출력 규격 CSS */
    .report-print-area { display: flex; flex-direction: column; align-items: center; gap: 20px; background: #e9ecef; padding: 20px 0; }
    .report-page { width: 210mm; height: 297mm; background: white; padding: 15mm; box-sizing: border-box; box-shadow: 0 0 10px rgba(0,0,0,0.1); position: relative; margin-bottom: 20px; display: flex; flex-direction: column; }
    
    .rp-header { display: flex; justify-content: space-between; align-items: center; border: 3px solid #000; border-radius: 8px; padding: 10px 15px; margin-bottom: 20px; }
    .rp-logo { font-size: 24px; font-weight: 900; color: #1a3978; display: flex; align-items: center; gap: 10px; }
    .rp-info-box { flex: 1; margin: 0 20px; border-left: 2px solid #ccc; border-right: 2px solid #ccc; padding: 0 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-weight: bold; font-size: 14px; }
    .rp-sign-box { display: flex; gap: 10px; }
    .rp-sign { border: 2px solid #000; width: 60px; height: 60px; display: flex; flex-direction: column; text-align: center; }
    .rp-sign-title { font-size: 11px; border-bottom: 1px solid #000; padding: 2px 0; background: #f8f9fa; }
    
    .rp-tables { display: flex; gap: 15px; margin-bottom: 20px; }
    .rp-table { border-collapse: collapse; width: 100%; text-align: center; font-size: 12px; font-weight: bold; }
    .rp-table th, .rp-table td { border: 1px solid #000; padding: 8px 4px; }
    .rp-table th { color: white; }
    .th-blue { background-color: #3b5998; } .th-green { background-color: #6b8e23; } .th-purple { background-color: #6a5acd; }
    
    .table-left { flex: 4; }
    .table-right { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
    .rp-highlight-row { border: 2px solid #6a5acd; color: #1a3978; }
    
    .rp-charts { display: flex; gap: 15px; flex: 1; margin-bottom: 15px; border: 1px solid #ccc; padding: 10px; border-radius: 8px; }
    .rp-chart-box { flex: 1; height: 250px; position: relative; }
    .rp-donut-box { width: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    
    .rp-footer { border: 2px solid #000; background: #000; color: white; padding: 10px; font-size: 11px; line-height: 1.5; border-radius: 4px; }

    @media print {
      body * { visibility: hidden; }
      #tab-report, #tab-report * { visibility: visible; }
      #tab-report { position: absolute; left: 0; top: 0; width: 100%; background: none; box-shadow: none; padding: 0; }
      .header-bar { display: none !important; }
      .report-print-area { background: white; padding: 0; }
      .report-page { box-shadow: none; margin: 0; page-break-after: always; }
      .report-page:last-child { page-break-after: auto; }
    }
  </style>
</head>
<body>

  <div class="spinner-overlay" id="globalSpinner"><div class="spinner"></div><div class="spinner-text" id="spinnerText">처리 중입니다...</div></div>
  <div class="modal-overlay" id="customAlertModal"><div class="modal-box"><div id="modalMessage" style="font-size:15px; font-weight:bold; line-height:1.5;"></div><button class="modal-btn" onclick="document.getElementById('customAlertModal').style.display='none'">확인</button></div></div>

  <div class="academy-header-bar">
    <span>SG청운학원 - 성적표 통합 시스템</span>
    <div style="display: flex; gap: 15px; align-items: center;">
      <button class="btn-action" style="background-color: #28a745;" onclick="document.getElementById('uploadFile').click()">📤 명단 일괄 업로드</button>
      <input type="file" id="uploadFile" accept=".xlsx, .xls" style="display:none;" onchange="handleRosterUpload(event)">
      <span style="font-size: 12px; color: #adb5bd; font-weight: normal;">v.26.07.23-05</span>
    </div>
  </div>

  <div class="app-body">
    <input type="hidden" id="backendUrl" value="https://script.google.com/macros/s/AKfycbwvGxr_gp1L2e7L5D_1u8LZ0BP2K07LMtjuRsvqKEVyCnBikAEYpqztc0REuXmoNMHvtg/exec">

    <div class="tab-container">
      <button class="tab-btn active" onclick="switchTab('tab-setup')">1. 시험 기본 세팅 (관리자)</button>
      <button class="tab-btn" onclick="switchTab('tab-input')">2. 채점 입력 (선생님)</button>
      <button class="tab-btn" onclick="switchTab('tab-report')">3. 성적표 출력</button>
    </div>

    <div id="tab-setup" class="tab-content active">
      <div class="header-bar">
        <div class="select-group">
          <label>시험명</label>
          <select id="setExamYear"><option value="2026">2026년</option><option value="2027">2027년</option></select>
          <select id="setExamTerm"><option value="봄학기">봄학기</option><option value="여름학기">여름학기</option><option value="가을학기">가을학기</option><option value="겨울학기">겨울학기</option></select>
          <select id="setExamType"><option value="LT-중간고사">LT-중간고사</option><option value="LT-기말고사">LT-기말고사</option></select>
        </div>
        <div class="select-group" style="margin-left: 15px;">
          <label>과정명</label>
          <select id="setCourseMain"><option value="초6-1">초6-1</option><option value="중1-1">중1-1</option><option value="중2-2">중2-2</option><option value="대수">대수</option></select>
          <select id="setCourseLevel"><option value="마루">마루</option><option value="가온">가온</option><option value="갈마">갈마</option><option value="별하">별하</option></select>
        </div>
        
        <div class="select-group" style="margin-left: 15px; border-left: 2px solid #dee2e6; padding-left: 15px;">
          <label>문항 수</label><input type="number" id="setupTotalCount" value="45" style="width: 60px;" onchange="renderSetupTable()">
          <label style="margin-left:5px;">시작 번호</label><input type="number" id="setupStartNum" value="1" style="width: 60px;" onchange="renderSetupTable()">
        </div>
        <button class="btn-primary" style="margin-left: auto;" onclick="saveExamSetup()">세팅 정보 저장</button>
      </div>

      <div class="paste-zone" id="hwpPasteZone">
        <h4 style="margin-top: 0; color: #1a3978; margin-bottom: 8px;">📄 한글(HWP) / 엑셀 표 복사-붙여넣기 영역</h4>
        <p style="color: #666; margin-bottom: 0; font-size: 13px;">답지 표(단원명, 난이도) 복사 후 이곳을 클릭하고 <b>Ctrl + V</b>를 누르세요.</p>
        <input type="text" id="pasteCatcher" style="opacity: 0; position: absolute; pointer-events: none;">
      </div>

      <div class="table-wrapper" style="max-height: 500px;">
        <table>
          <thead><tr><th width="8%">번호</th><th width="42%">출제 단원명</th><th width="20%">난이도</th><th width="20%">배점</th><th width="10%">상태</th></tr></thead>
          <tbody id="setupTableBody"></tbody>
        </table>
      </div>
    </div>

    <div id="tab-input" class="tab-content">
      <div class="header-bar">
        <div class="select-group">
          <label>캠퍼스</label><select id="inCampus"><option>영통</option><option>동탄</option></select>
        </div>
        <div class="select-group">
          <label>시험명</label>
          <select id="inExamYear"><option value="2026">2026년</option><option value="2027">2027년</option></select>
          <select id="inExamTerm"><option value="봄학기">봄학기</option><option value="여름학기">여름학기</option><option value="가을학기">가을학기</option><option value="겨울학기">겨울학기</option></select>
          <select id="inExamType"><option value="LT-중간고사">LT-중간고사</option><option value="LT-기말고사">LT-기말고사</option></select>
        </div>
        <div class="select-group">
          <label>과정명</label>
          <select id="inCourseMain"><option value="초6-1">초6-1</option><option value="중1-1">중1-1</option><option value="중2-2">중2-2</option><option value="대수">대수</option></select>
          <select id="inCourseLevel"><option value="마루">마루</option><option value="가온">가온</option><option value="갈마">갈마</option><option value="별하">별하</option></select>
        </div>
        <div class="select-group">
          <label>반명</label><input type="text" id="inClassName" placeholder="예: 갈마-7나" style="width: 100px;">
        </div>
        <button class="btn-primary" style="margin-left: auto;" onclick="loadInputData()">명단 불러오기</button>
        <button class="btn-primary" style="background-color: #d32f2f;" onclick="saveGrades()">결과 저장</button>
      </div>

      <div style="margin-bottom: 10px; display: none;" id="rosterCtrlBtns">
        <button class="btn-action" style="background-color: #6c757d;" onclick="addStudentRow()">+ 학생 수동 추가</button>
      </div>

      <div class="table-wrapper" style="display: none;" id="inputTableContainer">
        <table>
          <thead id="inputTableHeader"></thead>
          <tbody id="inputTableBody"></tbody>
        </table>
      </div>
      <div id="inputEmptyState" style="text-align: center; padding: 100px 0; color: #888; font-weight: bold; border: 2px dashed #dee2e6;">조건 선택 후 [명단 불러오기]를 눌러주세요.</div>
    </div>

    <div id="tab-report" class="tab-content">
      <div class="header-bar">
        <div class="select-group">
          <label>캠퍼스</label><select id="repCampus"><option>영통</option><option>동탄</option></select>
        </div>
        <div class="select-group">
          <label>시험명</label><select id="repExamYear"><option value="2026">2026년</option><option value="2027">2027년</option></select>
          <select id="repExamTerm"><option value="봄학기">봄학기</option><option value="여름학기">여름학기</option><option value="가을학기">가을학기</option><option value="겨울학기">겨울학기</option></select>
          <select id="repExamType"><option value="LT-중간고사">LT-중간고사</option><option value="LT-기말고사">LT-기말고사</option></select>
        </div>
        <div class="select-group">
          <label>과정명</label>
          <select id="repCourseMain"><option value="초6-1">초6-1</option><option value="중1-1">중1-1</option><option value="중2-2">중2-2</option><option value="대수">대수</option></select>
          <select id="repCourseLevel"><option value="마루">마루</option><option value="가온">가온</option><option value="갈마">갈마</option><option value="별하">별하</option></select>
        </div>
        <div class="select-group">
          <label>출력할 반</label><input type="text" id="repClassName" placeholder="예: 갈마-7나" style="width: 100px;">
        </div>
        <button class="btn-primary" style="margin-left: auto; background-color: #6a5acd;" onclick="generateReportCards()">성적표 렌더링</button>
        <button class="btn-primary" style="background-color: #1a3978;" onclick="window.print()">🖨️ 일괄 인쇄 (PDF)</button>
      </div>
      
      <div class="report-print-area" id="reportPrintArea">
        <div style="text-align: center; color: #aaa; margin-top: 100px; font-weight:bold;">
          [성적표 렌더링] 버튼을 누르면 이 영역에 A4 규격의 성적표가 그려집니다.
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script>
    function showAlert(msg) {
      document.getElementById('modalMessage').innerHTML = msg;
      document.getElementById('customAlertModal').style.display = 'flex';
    }
    function showLoading(status, msg = "처리 중입니다...") {
      document.getElementById('spinnerText').innerText = msg;
      document.getElementById('globalSpinner').style.display = status ? 'flex' : 'none';
    }
    function switchTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      event.target.classList.add('active');
    }
    function getCombined(prefix) {
      const p1 = document.getElementById(prefix+'Year') ? document.getElementById(prefix+'Year').value : "";
      const p2 = document.getElementById(prefix+'Term') ? document.getElementById(prefix+'Term').value : "";
      const p3 = document.getElementById(prefix+'Type') ? document.getElementById(prefix+'Type').value : "";
      return `${p1} ${p2} ${p3}`;
    }
    function getCourse(prefix) {
      return document.getElementById(prefix+'Main').value + " " + document.getElementById(prefix+'CourseLevel').value;
    }

    function handleRosterUpload(e) {
      const file = e.target.files[0];
      if (!file) return;
      showLoading(true, "명단을 파싱 중입니다...");
      
      let reader = new FileReader();
      reader.onload = function(evt) {
        let data = new Uint8Array(evt.target.result);
        let workbook = XLSX.read(data, {type: 'array'});
        let sheet = workbook.Sheets[workbook.SheetNames[0]];
        let jsonArr = XLSX.utils.sheet_to_json(sheet, {header: 1});
        
        let parsed = [];
        for (let i = 1; i < jsonArr.length; i++) {
          if (jsonArr[i].length >= 5) {
            parsed.push([jsonArr[i][0]||'', jsonArr[i][1]||'', jsonArr[i][2]||'', jsonArr[i][3]||'', jsonArr[i][4]||'', jsonArr[i][5]||'', jsonArr[i][6]||'']);
          }
        }
        
        const url = document.getElementById('backendUrl').value;
        if(url.includes('YOUR_GAS')) {
            showLoading(false); showAlert("가짜 명단 업로드 완료 (로컬)"); return;
        }
        fetch(url, { method: 'POST', body: JSON.stringify({ action: 'uploadRoster', students: parsed }) })
        .then(res => res.json()).then(r => {
          showLoading(false);
          if(r.success) showAlert("명단 업로드가 완료되었습니다.");
          else showAlert("에러: " + r.error);
        });
      };
      reader.readAsArrayBuffer(file);
      e.target.value = '';
    }

    function renderSetupTable() {
      const tc = parseInt(document.getElementById('setupTotalCount').value) || 45;
      const sn = parseInt(document.getElementById('setupStartNum').value) || 1;
      const tbody = document.getElementById('setupTableBody');
      tbody.innerHTML = '';
      for (let i = 0; i < tc; i++) {
        let q = sn + i;
        tbody.innerHTML += `<tr><td>${q}</td><td><input type="text" class="setup-input" id="unit_${q}"></td>
          <td><select class="setup-input" id="diff_${q}" onchange="updateScore(${q})">
          <option value="" hidden>선택</option><option value="하">하</option><option value="중">중</option><option value="상">상</option><option value="최상">최상</option></select></td>
          <td><input type="number" class="setup-input" id="score_${q}" readonly style="background:#f1f3f5; text-align:center;"></td>
          <td id="status_${q}" style="color:#adb5bd;">-</td></tr>`;
      }
    }
    window.onload = renderSetupTable;

    function updateScore(q) {
      let v = document.getElementById(`diff_${q}`).value;
      let s = v==="하"?2 : v==="중"?3 : v==="상"?4 : v==="최상"?5 : "";
      document.getElementById(`score_${q}`).value = s;
      let cell = document.getElementById(`status_${q}`);
      if(document.getElementById(`unit_${q}`).value.trim() && s) { cell.innerHTML="✔"; cell.style.color="#28a745"; }
      else { cell.innerHTML="-"; cell.style.color="#adb5bd"; }
    }

    document.getElementById('hwpPasteZone').onclick = function() { document.getElementById('pasteCatcher').focus(); };
    document.getElementById('pasteCatcher').addEventListener('paste', function(e) {
      e.preventDefault();
      let htmlData = (e.clipboardData || window.clipboardData).getData('text/html');
      let textData = (e.clipboardData || window.clipboardData).getData('text/plain');
      let rows = [];
      if(htmlData) {
        let t = document.createElement('div'); t.innerHTML = htmlData;
        let tbl = t.querySelector('table');
        if(tbl) tbl.querySelectorAll('tr').forEach(tr => {
          let r = Array.from(tr.querySelectorAll('td,th')).map(c => c.innerText.replace(/<[^>]+>/g, '').trim());
          if(r.join('')) rows.push(r);
        });
      } else if(textData) {
        textData.split(/\r?\n/).forEach(l => { let r = l.split('\t').map(c => c.trim()); if(r.join('')) rows.push(r); });
      }
      if(rows.length===0) return showAlert("표 데이터가 아닙니다.");
      
      let st = (rows[0].join('').includes('단원') || rows[0].join('').includes('난이도')) ? 1 : 0;
      let count = parseInt(document.getElementById('setupTotalCount').value);
      let sNum = parseInt(document.getElementById('setupStartNum').value);
      
      let c = 0;
      for(let i=st; i<rows.length && c<count; i++) {
        let u = rows[i].length>=3 ? rows[i][1] : rows[i][0];
        let d = rows[i].length>=3 ? rows[i][2] : rows[i][1];
        if(u) document.getElementById(`unit_${sNum+c}`).value = u;
        if(d) {
          let cd = d.replace(/[^가-힣]/g, '');
          let sel = document.getElementById(`diff_${sNum+c}`);
          if(sel) sel.value = cd;
        }
        updateScore(sNum+c);
        c++;
      }
      showAlert(`${c}개 파싱 완료`);
    });

    function saveExamSetup() {
      const p = { action: 'saveExamSetup', examName: getCombined('setExam'), courseName: getCourse('set'),
        totalCount: parseInt(document.getElementById('setupTotalCount').value),
        startNum: parseInt(document.getElementById('setupStartNum').value), items: [] };
      
      for(let i=0; i<p.totalCount; i++) {
        let q = p.startNum + i;
        p.items.push({ num: q, unit: document.getElementById(`unit_${q}`).value, diff: document.getElementById(`diff_${q}`).value, score: parseInt(document.getElementById(`score_${q}`).value)||0 });
      }
      showLoading(true, "저장 중...");
      const url = document.getElementById('backendUrl').value;
      if(url.includes('YOUR_GAS')) { setTimeout(() => { showLoading(false); showAlert("저장 성공 (로컬)"); }, 800); return; }
      fetch(url, { method: 'POST', body: JSON.stringify(p) })
      .then(r=>r.json()).then(r => { showLoading(false); r.success ? showAlert("저장 완료") : showAlert("에러: "+r.error); });
    }

    let currentExamSetup = null;
    function loadInputData() {
      const p = { action: 'loadInputWorkflow', campus: document.getElementById('inCampus').value, examName: getCombined('inExam'), courseName: getCourse('in'), className: document.getElementById('inClassName').value, teacherName: '담당선생님' }; 
      showLoading(true, "불러오는 중...");
      const url = document.getElementById('backendUrl').value;
      if(url.includes('YOUR_GAS')) {
        setTimeout(() => {
          showLoading(false);
          currentExamSetup = { totalCount: 28, startNum: 1, items: Array.from({length: 28}, (_, i) => ({ num: 1+i, score: 3 })) };
          renderInputTable([{name:"이재원"}, {name:"김철수"}]);
        }, 800); return;
      }
      fetch(url, { method: 'POST', body: JSON.stringify(p) })
      .then(r=>r.json()).then(r => {
        showLoading(false);
        if(r.success) { currentExamSetup = r.data.setupData; renderInputTable(r.data.students); } 
        else showAlert("에러: "+r.error);
      });
    }

    function renderInputTable(students) {
      document.getElementById('inputEmptyState').style.display = 'none';
      document.getElementById('inputTableContainer').style.display = 'block';
      document.getElementById('rosterCtrlBtns').style.display = 'block';
      const thead = document.getElementById('inputTableHeader'); const tbody = document.getElementById('inputTableBody');
      
      let tr1 = `<tr><th width="4%" rowspan="2">삭제</th><th width="10%" rowspan="2" class="sticky-col">학생명</th><th width="6%" rowspan="2" class="sticky-col" style="left: 10%;">현재총점</th><th colspan="${currentExamSetup.totalCount}">O/X (1/2)</th></tr><tr>`;
      for(let i=0; i<currentExamSetup.totalCount; i++) tr1 += `<th>${currentExamSetup.startNum+i}</th>`;
      thead.innerHTML = tr1 + "</tr>";
      tbody.innerHTML = '';
      students.forEach((st, i) => addStudentRowToTable(st.name, i));
      attachKeyboardNavigationListeners(currentExamSetup.totalCount, students.length);
    }

    function addStudentRow() {
      addStudentRowToTable("", document.getElementById('inputTableBody').children.length);
      attachKeyboardNavigationListeners(currentExamSetup.totalCount, document.getElementById('inputTableBody').children.length);
    }

    function addStudentRowToTable(name, rIdx) {
      let tr = document.createElement('tr');
      let html = `<td><button class="btn-action" style="background:#dc3545;" onclick="this.closest('tr').remove()">-</button></td>
        <td class="sticky-col"><input type="text" value="${name}" style="width:70px; border:none; text-align:center; font-weight:bold;"></td>
        <td class="sticky-col" style="left: 10%; font-weight:900; color:#1a3978;" id="total_${rIdx}">0</td>`;
      for(let i=0; i<currentExamSetup.totalCount; i++) {
        html += `<td><input type="text" class="ox-input grid-nav" data-row="${rIdx}" data-col="${i}" maxlength="1" oninput="handleOx(event, ${rIdx})"></td>`;
      }
      tr.innerHTML = html;
      document.getElementById('inputTableBody').appendChild(tr);
    }

    function handleOx(e, rIdx) {
      let v = e.target.value.toLowerCase();
      e.target.classList.remove('val-o', 'val-x');
      if(['1','o','ㅇ'].includes(v)) { e.target.value='O'; e.target.classList.add('val-o'); moveToNext(e.target); }
      else if(['2','x','ㅂ'].includes(v)) { e.target.value='X'; e.target.classList.add('val-x'); moveToNext(e.target); }
      else e.target.value='';
      
      let score = 0;
      e.target.closest('tr').querySelectorAll('.grid-nav').forEach((inp, i) => {
        if(inp.value === 'O') score += currentExamSetup.items[i].score || 0;
      });
      document.getElementById(`total_${rIdx}`).innerText = score;
    }

    function moveToNext(el) {
      let nr = el.dataset.row, nc = parseInt(el.dataset.col)+1;
      let next = document.querySelector(`.grid-nav[data-row="${nr}"][data-col="${nc}"]`);
      if(next) { next.focus(); if(next.value) next.select(); }
    }

    function attachKeyboardNavigationListeners(totalCols, totalRows) {
      const inputs = document.querySelectorAll('.grid-nav');
      inputs.forEach(input => {
        input.onkeydown = function(e) {
          let curRow = parseInt(this.dataset.row); let curCol = parseInt(this.dataset.col); let nextInput;
          if (e.key === "ArrowRight") nextInput = document.querySelector(`.grid-nav[data-row="${curRow}"][data-col="${curCol + 1}"]`);
          else if (e.key === "ArrowLeft") nextInput = document.querySelector(`.grid-nav[data-row="${curRow}"][data-col="${curCol - 1}"]`);
          else if (e.key === "ArrowDown") nextInput = document.querySelector(`.grid-nav[data-row="${curRow + 1}"][data-col="${curCol}"]`);
          else if (e.key === "ArrowUp") nextInput = document.querySelector(`.grid-nav[data-row="${curRow - 1}"][data-col="${curCol}"]`);
          else if (e.key === "Enter") {
            e.preventDefault();
            nextInput = document.querySelector(`.grid-nav[data-row="${curRow}"][data-col="${curCol + 1}"]`);
            if (!nextInput && curRow + 1 < totalRows) nextInput = document.querySelector(`.grid-nav[data-row="${curRow + 1}"][data-col="0"]`);
          }
          if (nextInput) { e.preventDefault(); nextInput.focus(); if(nextInput.value) nextInput.select(); }
        };
      });
    }

    function saveGrades() {
      let students = [];
      document.querySelectorAll('#inputTableBody tr').forEach(tr => {
        let name = tr.querySelector('td:nth-child(2) input').value.trim();
        if(!name) return;
        let ans = {};
        tr.querySelectorAll('.grid-nav').forEach((inp, i) => ans[currentExamSetup.startNum+i] = inp.value);
        students.push({ name: name, school: '', grade: '', totalScore: tr.querySelector('td:nth-child(3)').innerText, answers: ans });
      });
      
      const p = { action: 'saveStudentGrades', campus: document.getElementById('inCampus').value, examName: getCombined('inExam'), courseName: getCourse('in'), className: document.getElementById('inClassName').value, teacherName: '담당선생님', students: students };
      showLoading(true, "저장 중...");
      const url = document.getElementById('backendUrl').value;
      if(url.includes('YOUR_GAS')) { setTimeout(() => { showLoading(false); showAlert("저장 완료 (로컬)"); }, 800); return; }
      fetch(url, { method: 'POST', body: JSON.stringify(p) })
      .then(r=>r.json()).then(r => { showLoading(false); r.success ? showAlert("저장 완료") : showAlert("에러: "+r.error); });
    }

    // --- 3. 성적표 출력 ---
    function generateReportCards() {
      const p = { action: 'getReportData', examName: getCombined('repExam'), courseName: getCourse('rep'), className: document.getElementById('repClassName').value };
      showLoading(true, "성적표 생성 중...");
      
      const url = document.getElementById('backendUrl').value;
      if(url.includes('YOUR_GAS')) {
        setTimeout(() => {
          showLoading(false);
          let mockData = {
            examInfo: { name: p.examName, course: p.courseName, class: p.className, teacher: "이몽룡", aTotal: 116 },
            students: [{ name: "이재원", totalScore: 155, rank: "1 / 93", topPercent: 1, 
              units: [{name: "기본도형", m:30, s: 30, a: 23, r: 100}, {name: "위치관계", m:48, s: 48, a: 36, r: 100}, {name: "작도와합동", m:77, s: 77, a: 57, r: 100}],
              diffs: { low: {m:20, s:20, a:16, r:100}, mid: {m:30, s:30, a:24, r:100}, high: {m:40, s:40, a:27, r:100}, top: {m:65, s:65, a:50, r:100} }
            }]
          };
          drawReportCards(mockData);
        }, 800);
        return;
      }

      fetch(url, { method: 'POST', body: JSON.stringify(p) })
      .then(r=>r.json()).then(r => {
        showLoading(false);
        if(r.success) drawReportCards(r.data);
        else showAlert("에러: "+r.error);
      }).catch(err => { showLoading(false); showAlert("통신 오류"); });
    }

    function drawReportCards(data) {
      const area = document.getElementById('reportPrintArea');
      area.innerHTML = '';
      
      if(data.students.length === 0) {
        area.innerHTML = '<div style="margin-top: 50px; font-weight:bold; color:red;">해당 반의 성적 데이터가 없습니다.</div>';
        return;
      }

      data.students.forEach((st, idx) => {
        let page = document.createElement('div');
        page.className = 'report-page';
        
        let u1 = st.units[0]||{name:'-', m:'-', s:'-', a:'-', r:'-'};
        let u2 = st.units[1]||{name:'-', m:'-', s:'-', a:'-', r:'-'};
        let u3 = st.units[2]||{name:'-', m:'-', s:'-', a:'-', r:'-'};
        let u4 = st.units[3]||{name:'-', m:'-', s:'-', a:'-', r:'-'};
        let d = st.diffs;

        let html = `
          <div class="rp-header">
            <div class="rp-logo">SG청운학원</div>
            <div class="rp-info-box">
              <div>- 테스트 : ${data.examInfo.name}</div>
              <div>- 학생명 : ${st.name}</div>
              <div>- 과정명 : ${data.examInfo.course} (${data.examInfo.class})</div>
              <div>- 담임명 : ${data.examInfo.teacher}</div>
            </div>
            <div class="rp-sign-box">
              <div class="rp-sign"><div class="rp-sign-title">담임</div><div></div></div>
              <div class="rp-sign"><div class="rp-sign-title">학부모</div><div></div></div>
            </div>
          </div>
          
          <div class="rp-tables">
            <div class="table-left">
              <table class="rp-table">
                <thead><tr><th colspan="5" class="th-blue">단원별 성적</th><th colspan="4" class="th-green">문항수준별 성적</th></tr>
                <tr><th class="th-blue">단원</th><th class="th-blue">${u1.name}</th><th class="th-blue">${u2.name}</th><th class="th-blue">${u3.name}</th><th class="th-blue">${u4.name}</th>
                <th class="th-green">하</th><th class="th-green">중</th><th class="th-green">상</th><th class="th-green">최상</th></tr></thead>
                <tbody>
                  <tr><td>기초만점</td><td>${u1.m}</td><td>${u2.m}</td><td>${u3.m}</td><td>${u4.m}</td><td>${d.low.m}</td><td>${d.mid.m}</td><td>${d.high.m}</td><td>${d.top.m}</td></tr>
                  <tr class="rp-highlight-row"><td>${st.name}</td><td>${u1.s}</td><td>${u2.s}</td><td>${u3.s}</td><td>${u4.s}</td>
                  <td>${d.low.s}</td><td>${d.mid.s}</td><td>${d.high.s}</td><td>${d.top.s}</td></tr>
                  <tr><td>전체평균</td><td>${u1.a}</td><td>${u2.a}</td><td>${u3.a}</td><td>${u4.a}</td>
                  <td>${d.low.a}</td><td>${d.mid.a}</td><td>${d.high.a}</td><td>${d.top.a}</td></tr>
                  <tr><td>항목별 정답률</td>
                  <td style="color:${u1.r<80?'red':'green'}">${u1.r}%</td><td style="color:${u2.r<80?'red':'green'}">${u2.r}%</td><td style="color:${u3.r<80?'red':'green'}">${u3.r}%</td><td style="color:${u4.r<80?'red':'green'}">${u4.r}%</td>
                  <td style="color:${d.low.r<80?'red':'green'}">${d.low.r}%</td><td style="color:${d.mid.r<80?'red':'green'}">${d.mid.r}%</td><td style="color:${d.high.r<80?'red':'green'}">${d.high.r}%</td><td style="color:${d.top.r<80?'red':'green'}">${d.top.r}%</td></tr>
                </tbody>
              </table>
            </div>
            <div class="table-right">
              <table class="rp-table">
                <thead><tr><th class="th-purple">총점</th></tr></thead><tbody><tr class="rp-highlight-row"><td>${st.totalScore}</td></tr><tr><td>(평균 ${data.examInfo.aTotal})</td></tr></tbody>
              </table>
              <table class="rp-table" style="margin-top:5px;">
                <thead><tr><th class="th-purple">석차</th></tr></thead><tbody><tr class="rp-highlight-row"><td>${st.rank}</td></tr></tbody>
              </table>
            </div>
          </div>
          
          <div class="rp-charts">
            <div class="rp-chart-box"><canvas id="chartUnit_${idx}"></canvas></div>
            <div class="rp-chart-box"><canvas id="chartDiff_${idx}"></canvas></div>
            <div class="rp-donut-box"><canvas id="chartDonut_${idx}"></canvas><div style="font-size:11px; font-weight:bold; margin-top:5px;">동일과정 상위</div></div>
          </div>
          
          <div class="rp-footer">
            - 단원별 성적 : 출제 문항 중 각 단원별 점수를 나타냅니다.<br>
            - 문항수준별 성적 : 출제 문항 중 배점에 따른 난이도별 점수를 나타냅니다.<br>
            - 각 항목에서 항목별 정답률이 80% 이상이면 초록색, 80% 미만이면 빨간색으로 표시됩니다. 빨간색인 경우 해당 영역의 보완 학습을 권장합니다.
          </div>
        `;
        page.innerHTML = html;
        area.appendChild(page);

        // Chart.js 렌더링
        let validUnits = st.units.filter(u => u.name !== '-');
        let unitLabels = validUnits.map(u => u.name);
        let unitS = validUnits.map(u => u.s); let unitA = validUnits.map(u => u.a);
        
        new Chart(document.getElementById(`chartUnit_${idx}`), {
          type: 'bar', data: { labels: unitLabels, datasets: [{label: st.name, data: unitS, backgroundColor: '#3b5998'}, {label: '전체평균', data: unitA, backgroundColor: '#adb5bd'}] },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
        });

        new Chart(document.getElementById(`chartDiff_${idx}`), {
          type: 'bar', data: { labels: ['하','중','상','최상'], datasets: [{label: st.name, data: [d.low.s, d.mid.s, d.high.s, d.top.s], backgroundColor: '#6b8e23'}, {label: '전체평균', data: [d.low.a, d.mid.a, d.high.a, d.top.a], backgroundColor: '#adb5bd'}] },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
        });

        new Chart(document.getElementById(`chartDonut_${idx}`), {
          type: 'doughnut', data: { datasets: [{ data: [st.topPercent, 100-st.topPercent], backgroundColor: ['#6a5acd', '#e9ecef'], borderWidth: 0 }] },
          options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { title: {display:true, text: st.topPercent+'%', position: 'bottom', font: {size: 16}} } }
        });
      });
    }
  </script>
</body>
